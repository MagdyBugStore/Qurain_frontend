<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Session - Whiteboard View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Noto+Sans+Arabic:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f4c025",
                        "primary-content": "#181611",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2c281b",
                        "text-light": "#181611",
                        "text-dark": "#f5f3f0",
                        "text-muted-light": "#8a8060",
                        "text-muted-dark": "#afa68e",
                        "border-light": "#e6e4df",
                        "border-dark": "#3d3929",
                    },
                    fontFamily: {
                        display: ['"Manrope"', '"Noto Sans Arabic"', "sans-serif"],
                        body: ['"Manrope"', '"Noto Sans Arabic"', "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "0.75rem",
                        xl: "1rem",
                        full: "9999px",
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', 'Noto Sans Arabic', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark min-h-screen flex flex-col overflow-hidden">
<!-- Header -->
<header class="h-16 border-b border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark flex items-center justify-between px-6 z-50 shadow-sm">
<div class="flex items-center gap-4">
<div class="flex items-center gap-3 text-text-light dark:text-text-dark">
<div class="size-8 text-primary">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.1739 20.1739L27.8261 5.82609C29.1366 7.13663 28.3989 10.1876 26.2002 13.7654C24.8538 15.9564 22.9595 18.3449 20.6522 20.6522C18.3449 22.9595 15.9564 24.8538 13.7654 26.2002C10.1876 28.3989 7.13663 29.1366 5.82609 27.8261L20.1739 42.1739C21.4845 43.4845 24.5355 42.7467 28.1133 40.548C30.3042 39.2016 32.6927 37.3073 35 35C37.3073 32.6927 39.2016 30.3042 40.548 28.1133C42.7467 24.5355 43.4845 21.4845 42.1739 20.1739Z"></path>
</svg>
</div>
<h2 class="text-lg font-bold tracking-tight">قرآن أونلاين</h2>
</div>
<div class="h-6 w-px bg-border-light dark:bg-border-dark mx-2"></div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
<span class="text-sm font-medium text-text-muted-light dark:text-text-muted-dark">مباشر: 00:42:15</span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-lg hover:bg-background-light dark:hover:bg-border-dark transition-colors text-text-muted-light dark:text-text-muted-dark hover:text-text-light dark:hover:text-text-dark">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex items-center justify-center size-10 rounded-lg bg-background-light dark:bg-border-dark text-text-light dark:text-text-dark">
<span class="material-symbols-outlined">mic</span>
</button>
<button class="flex items-center justify-center size-10 rounded-lg bg-background-light dark:bg-border-dark text-text-light dark:text-text-dark">
<span class="material-symbols-outlined">videocam</span>
</button>
<button class="flex items-center justify-center px-4 h-10 rounded-lg bg-red-500 hover:bg-red-600 text-white font-bold text-sm gap-2 transition-colors">
<span class="material-symbols-outlined text-[18px]">call_end</span>
<span>إنهاء الجلسة</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex flex-1 overflow-hidden relative">
<!-- Right Sidebar (Tools & Collapsed Mushaf) -->
<aside class="w-16 md:w-20 bg-surface-light dark:bg-surface-dark border-l border-border-light dark:border-border-dark flex flex-col items-center py-6 gap-6 shadow-sm z-20">
<div class="flex flex-col gap-4 w-full px-2">
<button class="group flex flex-col items-center gap-1 w-full p-2 rounded-xl hover:bg-background-light dark:hover:bg-border-dark transition-colors" title="المصحف">
<div class="p-2 rounded-lg bg-background-light dark:bg-border-dark text-text-light dark:text-text-dark group-hover:bg-white dark:group-hover:bg-surface-dark shadow-sm">
<span class="material-symbols-outlined">menu_book</span>
</div>
<span class="text-[10px] font-medium text-text-muted-light dark:text-text-muted-dark">المصحف</span>
</button>
<button class="group flex flex-col items-center gap-1 w-full p-2 rounded-xl bg-primary/10 dark:bg-primary/20" title="السبورة">
<div class="p-2 rounded-lg bg-primary text-primary-content shadow-sm">
<span class="material-symbols-outlined fill">draw</span>
</div>
<span class="text-[10px] font-bold text-primary dark:text-primary">السبورة</span>
</button>
<button class="group flex flex-col items-center gap-1 w-full p-2 rounded-xl hover:bg-background-light dark:hover:bg-border-dark transition-colors" title="ملاحظات">
<div class="p-2 rounded-lg text-text-muted-light dark:text-text-muted-dark group-hover:text-text-light dark:group-hover:text-text-dark">
<span class="material-symbols-outlined">sticky_note_2</span>
</div>
<span class="text-[10px] font-medium text-text-muted-light dark:text-text-muted-dark">ملاحظات</span>
</button>
<button class="group flex flex-col items-center gap-1 w-full p-2 rounded-xl hover:bg-background-light dark:hover:bg-border-dark transition-colors" title="محادثة">
<div class="p-2 rounded-lg text-text-muted-light dark:text-text-muted-dark group-hover:text-text-light dark:group-hover:text-text-dark relative">
<span class="material-symbols-outlined">chat</span>
<span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-surface-light dark:border-surface-dark"></span>
</div>
<span class="text-[10px] font-medium text-text-muted-light dark:text-text-muted-dark">شات</span>
</button>
</div>
<div class="mt-auto flex flex-col gap-4 w-full px-2">
<button class="flex items-center justify-center p-3 rounded-xl hover:bg-background-light dark:hover:bg-border-dark text-text-muted-light dark:text-text-muted-dark transition-colors">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</aside>
<!-- Center Area (Whiteboard Canvas) -->
<section class="flex-1 relative bg-[#fdfdfc] dark:bg-[#1a1a1a] flex flex-col">
<!-- Toolbar (Floating) -->
<div class="absolute top-6 left-1/2 -translate-x-1/2 bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark shadow-lg rounded-full px-4 py-2 flex items-center gap-2 z-10 max-w-[90%] overflow-x-auto">
<button class="p-2 rounded-full hover:bg-background-light dark:hover:bg-border-dark text-text-light dark:text-text-dark" title="Select">
<span class="material-symbols-outlined">near_me</span>
</button>
<div class="w-px h-6 bg-border-light dark:bg-border-dark mx-1"></div>
<button class="p-2 rounded-full bg-primary/20 text-primary-dark dark:text-primary font-bold shadow-inner" title="Pen">
<span class="material-symbols-outlined fill">edit</span>
</button>
<button class="p-2 rounded-full hover:bg-background-light dark:hover:bg-border-dark text-text-light dark:text-text-dark" title="Highlighter">
<span class="material-symbols-outlined">ink_highlighter</span>
</button>
<button class="p-2 rounded-full hover:bg-background-light dark:hover:bg-border-dark text-text-light dark:text-text-dark" title="Eraser">
<span class="material-symbols-outlined">ink_eraser</span>
</button>
<div class="w-px h-6 bg-border-light dark:bg-border-dark mx-1"></div>
<button class="p-2 rounded-full hover:bg-background-light dark:hover:bg-border-dark text-text-light dark:text-text-dark" title="Shapes">
<span class="material-symbols-outlined">shapes</span>
</button>
<button class="p-2 rounded-full hover:bg-background-light dark:hover:bg-border-dark text-text-light dark:text-text-dark" title="Text">
<span class="material-symbols-outlined">title</span>
</button>
<div class="w-px h-6 bg-border-light dark:bg-border-dark mx-1"></div>
<button class="p-2 rounded-full hover:bg-background-light dark:hover:bg-border-dark text-text-light dark:text-text-dark" title="Undo">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="p-2 rounded-full hover:bg-background-light dark:hover:bg-border-dark text-text-light dark:text-text-dark" title="Redo">
<span class="material-symbols-outlined">redo</span>
</button>
<div class="w-px h-6 bg-border-light dark:bg-border-dark mx-1"></div>
<button class="p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500" title="Clear All">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Canvas Background -->
<div class="w-full h-full cursor-crosshair relative bg-white dark:bg-[#1a1a1a]" style="background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px;">
<!-- Simulated Drawings -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<!-- Example path mimicking handwritten Arabic or diagram -->
<path d="M 400 300 Q 500 200 600 300 T 800 300" fill="none" stroke="#f4c025" stroke-linecap="round" stroke-width="4"></path>
<text direction="rtl" fill="#f4c025" font-family="Manrope" font-size="24" x="500" y="250">حرف الألف</text>
<rect class="stroke-slate-900 dark:stroke-slate-100" fill="none" height="100" rx="10" stroke="#181611" stroke-width="2" width="150" x="200" y="150"></rect>
<circle cx="275" cy="200" fill="#f4c025" opacity="0.2" r="30"></circle>
</svg>
<div class="absolute bottom-6 right-6 bg-surface-light dark:bg-surface-dark p-2 rounded-lg shadow-md border border-border-light dark:border-border-dark flex items-center gap-2">
<div class="size-6 rounded-full bg-black border border-gray-200 cursor-pointer"></div>
<div class="size-6 rounded-full bg-red-500 cursor-pointer"></div>
<div class="size-6 rounded-full bg-blue-500 cursor-pointer"></div>
<div class="size-6 rounded-full bg-primary ring-2 ring-offset-2 ring-primary cursor-pointer"></div>
</div>
</div>
<!-- Student Video (Floating Draggable) -->
<div class="absolute top-6 right-6 w-64 aspect-video bg-black rounded-xl shadow-2xl overflow-hidden border-2 border-surface-light dark:border-surface-dark group cursor-move">
<div class="absolute top-2 left-2 z-10 bg-black/50 backdrop-blur-sm px-2 py-1 rounded text-xs text-white font-medium flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                    الطالب: أحمد
                </div>
<div class="absolute bottom-2 right-2 z-10 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="p-1 rounded bg-black/50 text-white hover:bg-black/70"><span class="material-symbols-outlined text-[16px]">mic_off</span></button>
<button class="p-1 rounded bg-black/50 text-white hover:bg-black/70"><span class="material-symbols-outlined text-[16px]">videocam_off</span></button>
</div>
<div class="w-full h-full bg-cover bg-center" data-alt="Student smiling in a video call" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCO97HjuULvt1KcU7b09dcYriUyBgMre37TqCpw8-cXPnIGyXdw2PzpD8Lcg707GADNOkaqKfO3UavFdNvGi_3X_jCaBBWZxmIYUu5eAZTyzQApzcA5Uuxw-481_6vymMWTpnqaJIZa4IKq8wT36aK9XaA46qbpSd3YhB0VZiRgjuVsrkUXeMz_rU2PV_e4IJLxcKmXFo4SyeFtDZzkt8RQ_V0FNuVNsbi2EkU0yN8nY6FF4rSbPgMTSB2eMqHngrZ2X8Dc77h4NwUl');"></div>
</div>
<!-- Tutor Video (Pinned Bottom Left) -->
<div class="absolute bottom-6 left-6 w-48 aspect-video bg-surface-dark rounded-xl shadow-2xl overflow-hidden border-2 border-primary group">
<div class="absolute top-2 left-2 z-10 bg-primary px-2 py-0.5 rounded text-[10px] text-primary-content font-bold shadow-sm">
                    أنت (المعلم)
                </div>
<div class="w-full h-full bg-cover bg-center opacity-90" data-alt="Tutor looking at screen" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBJQwrVchPJynJ1e1DOqjcenWlg8N4mrbQ-0A6WtcHTl0ruFpg741Vy9v1a3Y45otmMvQ56aftWH1Nth3iD63kb3G6oHCoCLp4MXdJqKk02yR6l2tttIdy3BxfXtKpkBXgW_qaujcsjY3gO3FdrgO-O7yJbiOsXKeXVM0siywxQFv1FsW_dXPPIv7bijzXPxZZvtXjE931xMumdh3--mNb-MIzkjSV5FbrnlS8bapKeRmyoyLFD6FtS-NxYAjRG0HwzfDhjrmYtk8vZ');"></div>
<div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-black/10 transition-colors">
</div>
<div class="absolute bottom-2 left-2 z-10 flex gap-1">
<div class="flex gap-0.5">
<div class="w-1 h-3 bg-white rounded-full animate-bounce"></div>
<div class="w-1 h-2 bg-white rounded-full animate-bounce delay-75"></div>
<div class="w-1 h-4 bg-white rounded-full animate-bounce delay-150"></div>
</div>
</div>
</div>
</section>
</main>
</body></html>
